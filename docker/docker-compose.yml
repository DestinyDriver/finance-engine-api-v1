version: "3.9"
services:
  app:
    build: ..
    container_name: finance-dashboard-api
    env_file:
      - ../.env.example
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ..:/app
    command: npm run dev
  postgres:
    image: postgres:16-alpine
    container_name: finance-dashboard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: finance-dashboard-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
